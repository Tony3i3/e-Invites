<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>حفل زفاف جورج و ماريا — CARTA</title>
<meta name="description" content="دعوة زفاف جورج خوري و ماريا سمعان — Wedding Invitation">
<meta property="og:title" content="حفل زفاف جورج و ماريا">
<meta property="og:description" content="يتشرفون بدعوتكم لحضور حفل زفاف جورج و ماريا">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════��════════════════════════════════════════════════
   CSS VARIABLES — EDIT THESE TO CUSTOMIZE
   ═══════════════════════════════════════════════════════════ */
:root {
  /* ═══════ BACKGROUND (Change these to customize) ═══════ */
  --bg-deep: #0B1121;
  --bg-primary: #0E1529;
  --bg-card: #141E35;
  --bg-card-hover: #1A2540;
  --bg-image: none;            /* Add your Canva/Figma background: url('bg.jpg') */
  --bg-image-opacity: 0.15;    /* How visible the background image is */
  --bg-overlay-opacity: 0.85;  /* Overlay darkness (higher = darker) */
  --texture-opacity: 0.03;     /* Paper texture intensity */
  /* ═══════ COLORS ═══════ */
  --gold: #C4A265;
  --gold-light: #DFC999;
  --gold-bright: #D4AF37;
  --gold-dark: #8E7A4A;
  --warm-white: #ECE6DC;
  --text-secondary: #8A8478;
  --text-muted: #5C564E;
  --rose: #C47070;
  --success: #6AAF6A;
  /* ══��════ FONTS ═══════ */
  --font-display-ar: 'Aref Ruqaa', serif;
  --font-verse-ar: 'Amiri', serif;
  --font-body-ar: 'Tajawal', sans-serif;
  --font-display-en: 'Playfair Display', serif;
  --font-body-en: 'Montserrat', sans-serif;
  --font-display: var(--font-display-ar);
  --font-verse: var(--font-verse-ar);
  --font-body: var(--font-body-ar);
}
/* ═══════ RESET & BASE ═══════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--warm-white);
  overflow-x: hidden;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body.locked { overflow: hidden; }
/* ═══════ CUSTOM SCROLLBAR ═══════ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }
/* ═══════ LAYERED BACKGROUND ═══════ */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
/* Layer 2: Background Image */
.bg-layer--image {
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: var(--bg-image-opacity);
}
/* Layer 3: Overlay */
.bg-layer--overlay {
  background: linear-gradient(180deg, 
    rgba(11,17,33, var(--bg-overlay-opacity)) 0%,
    rgba(14,21,41, calc(var(--bg-overlay-opacity) - 0.05)) 50%,
    rgba(11,17,33, var(--bg-overlay-opacity)) 100%
  );
}
/* Layer 4: Texture */
.bg-layer--texture {
  opacity: var(--texture-opacity);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}
/* Layer 5: Particles container */
#particles-container {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}
/* ═══════ MAIN CONTENT ═══════ */
main {
  position: relative;
  z-index: 1;
}
section {
  position: relative;
  padding: 60px 20px;
  min-height: auto;
}
.section-inner {
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
/* ═══════ TYPOGRAPHY ═══════ */
.font-display { font-family: var(--font-display); }
.font-verse { font-family: var(--font-verse); }
.font-body { font-family: var(--font-body); }
.text-gold { color: var(--gold); }
.text-gold-light { color: var(--gold-light); }
.text-secondary { color: var(--text-secondary); }
.text-muted { color: var(--text-muted); }
.text-rose { color: var(--rose); }
/* ═══════ GOLD SHIMMER TEXT ═══════ */
.gold-shimmer {
  background: linear-gradient(
    120deg,
    var(--gold-dark) 0%,
    var(--gold) 20%,
    var(--gold-light) 40%,
    var(--gold-bright) 50%,
    var(--gold-light) 60%,
    var(--gold) 80%,
    var(--gold-dark) 100%
  );
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 4s ease-in-out infinite;
}
@keyframes shimmer {
  0%, 100% { background-position: 100% 50%; }
  50% { background-position: 0% 50%; }
}
/* ═══════ HEARTBEAT SVG ═══════ */
.heartbeat {
  animation: heartbeat 1.5s ease-in-out infinite;
  color: var(--rose);
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.2); }
  30% { transform: scale(1); }
  45% { transform: scale(1.1); }
  60% { transform: scale(1); }
}
/* ═══════ DECORATIVE DIVIDERS ═══════ */
.gold-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 24px auto;
  width: 80%;
  max-width: 300px;
}
.gold-divider .line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
}
.gold-divider .diamond {
  width: 6px;
  height: 6px;
  background: var(--gold);
  transform: rotate(45deg);
  flex-shrink: 0;
}
/* ═══════ ORNAMENTAL CORNERS (SVG) ═══════ */
.ornament-corner {
  position: absolute;
  width: 80px;
  height: 80px;
  color: var(--gold-light);
  opacity: 0.25;
  pointer-events: none;
}
.ornament-corner.top-right { top: 10px; right: 10px; }
.ornament-corner.top-left { top: 10px; left: 10px; transform: scaleX(-1); }
.ornament-corner.bottom-left { bottom: 10px; left: 10px; transform: scaleY(-1); }
.ornament-corner.bottom-right { bottom: 10px; right: 10px; transform: scale(-1, -1); }
/* ═══════ SCROLL REVEAL ═══════ */
.reveal {
  opacity: 0;
  transform: translateY(35px);
  transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
/* ═══════ CARDS ═══════ */
.card {
  background: var(--bg-card);
  border: 1px solid rgba(196, 162, 101, 0.12);
  border-radius: 12px;
  padding: 28px 20px;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              border-color 0.4s ease;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(196, 162, 101, 0.08);
  border-color: rgba(196, 162, 101, 0.25);
}
/* ═══════ BUTTONS ═══════ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  border: none;
  border-radius: 8px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  min-height: 44px;
  min-width: 44px;
  text-decoration: none;
  color: var(--warm-white);
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-bright));
  color: var(--bg-deep);
  font-weight: 600;
}
.btn-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(196, 162, 101, 0.3);
}
.btn-outline {
  background: transparent;
  border: 1px solid var(--gold-dark);
  color: var(--gold-light);
}
.btn-outline:hover {
  border-color: var(--gold);
  background: rgba(196, 162, 101, 0.08);
  transform: translateY(-2px);
}
/* ═══════════════════════════════════════════
   SCREEN 1: OPENING ENVELOPE
   ═══════════════════════════════════════════ */
#opening-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-deep);
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
              filter 0.8s ease;
}
#opening-overlay.opening {
  transform: translateY(-100%);
  opacity: 0;
  filter: blur(10px);
}
#opening-overlay .radial-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(196,162,101,0.06) 0%, transparent 70%);
  animation: pulseGlow 4s ease-in-out infinite;
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}
.envelope-frame {
  position: relative;
  width: calc(100% - 40px);
  max-width: 420px;
  padding: 50px 24px;
  text-align: center;
  /* Double border with corner accents */
  border: 1px solid rgba(196, 162, 101, 0.2);
  outline: 1px solid rgba(196, 162, 101, 0.08);
  outline-offset: 6px;
}
.envelope-frame::before,
.envelope-frame::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--gold-light);
  opacity: 0.5;
}
.envelope-frame::before {
  top: -4px; left: -4px;
  border-top: 1px solid;
  border-left: 1px solid;
}
.envelope-frame::after {
  bottom: -4px; right: -4px;
  border-bottom: 1px solid;
  border-right: 1px solid;
}
.envelope-corners-extra .c-tl,
.envelope-corners-extra .c-br {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: var(--gold-light);
  opacity: 0.5;
}
.envelope-corners-extra .c-tl {
  top: -4px; right: -4px;
  border-top: 1px solid;
  border-right: 1px solid;
}
.envelope-corners-extra .c-br {
  bottom: -4px; left: -4px;
  border-bottom: 1px solid;
  border-left: 1px solid;
}
.opening-religious {
  font-family: var(--font-verse-ar);
  font-size: 16px;
  color: var(--gold-light);
  margin-bottom: 20px;
  line-height: 2;
}
.opening-families {
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--warm-white);
  margin-bottom: 8px;
}
.opening-invite-text {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.opening-couple-names {
  font-family: var(--font-display);
  font-size: 36px;
  line-height: 1.4;
  margin-bottom: 20px;
}
.opening-heart {
  display: inline-block;
  margin: 8px 0;
}
.opening-date {
  font-size: 14px;
  color: var(--gold-dark);
  margin-bottom: 24px;
  letter-spacing: 1px;
}
.opening-guest {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--gold-light);
  margin-bottom: 28px;
}
.btn-open {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 14px 36px;
  font-size: 16px;
  font-family: var(--font-body);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.4s ease;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.btn-open:hover {
  background: rgba(196, 162, 101, 0.1);
  box-shadow: 0 0 30px rgba(196, 162, 101, 0.15);
}
.btn-open:active {
  transform: scale(0.95);
}
/* ═══════════════════════════════════════════
   SCREEN 2: HERO
   ═════════════════════════════���═════════════ */
#hero {
  padding-top: 80px;
  padding-bottom: 80px;
  min-height: 100vh;
  display: flex;
  align-items: center;
}
.hero-religious {
  font-family: var(--font-verse-ar);
  font-size: 14px;
  color: var(--gold-dark);
  margin-bottom: 20px;
}
.hero-family-block {
  margin-bottom: 16px;
}
.hero-parents {
  font-size: 13px;
  color: var(--text-secondary);
}
.hero-family-name {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--gold-light);
}
.hero-invite-text {
  font-size: 14px;
  color: var(--text-secondary);
  margin: 16px 0;
}
.hero-couple-names {
  font-family: var(--font-display);
  font-size: 42px;
  line-height: 1.3;
  margin: 8px 0 16px;
}
@media (max-width: 380px) {
  .hero-couple-names { font-size: 34px; }
  .opening-couple-names { font-size: 30px; }
}
.hero-date {
  font-size: 15px;
  color: var(--gold);
  margin-bottom: 4px;
}
.hero-venue {
  font-size: 13px;
  color: var(--text-secondary);
}
.scroll-indicator {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  font-size: 12px;
  animation: bobDown 2s ease-in-out infinite;
}
@keyframes bobDown {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(8px); }
}
/* ═══════════════════════════════════════════
   SCREEN 3: VERSE
   ═══════════════════════════════════════════ */
#verse {
  padding: 80px 20px;
}
.verse-text {
  font-family: var(--font-verse);
  font-size: 20px;
  line-height: 2;
  color: var(--warm-white);
  max-width: 500px;
  margin: 0 auto 16px;
  position: relative;
}
.verse-quote-mark {
  font-size: 80px;
  color: var(--gold);
  opacity: 0.15;
  line-height: 0.5;
  font-family: Georgia, serif;
  display: block;
  margin-bottom: 12px;
}
.verse-reference {
  font-size: 14px;
  color: var(--gold-dark);
}
/* ═══════════════════════════════════════════
   SCREEN 4: COUNTDOWN
   ═══════════════════════════════════════════ */
.countdown-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 32px;
}
.countdown-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  max-width: 400px;
  margin: 0 auto;
}
.countdown-cell {
  background: var(--bg-card);
  border: 1px solid rgba(196, 162, 101, 0.1);
  border-radius: 10px;
  padding: 20px 8px 16px;
  position: relative;
  overflow: hidden;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              box-shadow 0.4s ease;
}
.countdown-cell::before {
  content: '';
  position: absolute;
  top: 0;
  left: 15%;
  right: 15%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.countdown-cell:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 30px rgba(196, 162, 101, 0.1);
}
.countdown-number {
  font-family: var(--font-display);
  font-size: 32px;
  color: var(--gold);
  display: block;
  transition: transform 0.3s ease;
}
.countdown-label {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 6px;
  display: block;
}
.countdown-done {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--gold);
  text-align: center;
  padding: 30px;
}
/* ═══════════════════════════════════════════
   SCREEN 5: EVENT DETAILS
   ═══════════════════════════════════════════ */
.events-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  margin-top: 28px;
}
@media (min-width: 640px) {
  .events-grid { grid-template-columns: 1fr 1fr; }
}
.event-card {
  background: var(--bg-card);
  border: 1px solid rgba(196, 162, 101, 0.1);
  border-radius: 12px;
  padding: 28px 20px;
  text-align: center;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
              box-shadow 0.4s ease, border-color 0.4s ease;
}
.event-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 40px rgba(196, 162, 101, 0.08);
  border-color: rgba(196, 162, 101, 0.25);
}
.event-card .event-icon {
  color: var(--gold);
  margin-bottom: 16px;
}
.event-card .event-title {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--gold-light);
  margin-bottom: 16px;
}
.event-detail {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 13px;
  color: var(--text-secondary);
}
.event-detail svg { color: var(--gold-dark); flex-shrink: 0; }
.event-map {
  width: 100%;
  height: 180px;
  border-radius: 8px;
  overflow: hidden;
  margin: 16px 0;
  border: 1px solid rgba(196, 162, 101, 0.1);
}
.event-map iframe {
  width: 100%;
  height: 100%;
  border: 0;
  filter: grayscale(1) brightness(0.4) contrast(1.2);
  transition: filter 0.5s ease;
}
.event-map:hover iframe {
  filter: none;
}
.locations-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 28px;
}
@media (max-width: 400px) {
  .locations-grid { grid-template-columns: 1fr; }
}
.location-card {
  background: var(--bg-card);
  border: 1px solid rgba(196, 162, 101, 0.08);
  border-radius: 10px;
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.4s ease;
}
.location-card:hover {
  transform: translateY(-3px);
  border-color: rgba(196, 162, 101, 0.2);
}
.location-card .loc-label {
  font-family: var(--font-display);
  font-size: 15px;
  color: var(--gold-light);
  margin-bottom: 6px;
}
.location-card .loc-address {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
/* ═══════════════════════════════════════════
   SCREEN 6: TIMELINE
   ═══════════════════════════════════════════ */
.timeline-container {
  position: relative;
  max-width: 500px;
  margin: 32px auto 0;
  padding: 0 20px;
}
.timeline-line {
  position: absolute;
  right: 30px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--gold-dark) 15%, var(--gold-dark) 85%, transparent);
}
[dir="ltr"] .timeline-line {
  right: auto;
  left: 30px;
}
.timeline-item {
  position: relative;
  padding: 0 50px 40px 0;
  text-align: right;
}
[dir="ltr"] .timeline-item {
  padding: 0 0 40px 50px;
  text-align: left;
}
.timeline-dot {
  position: absolute;
  right: 24px;
  top: 6px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--gold-dark);
  background: var(--bg-deep);
  transition: all 0.4s ease;
  z-index: 1;
}
[dir="ltr"] .timeline-dot {
  right: auto;
  left: 24px;
}
.timeline-item.visible .timeline-dot {
  background: var(--gold);
  border-color: var(--gold-light);
  box-shadow: 0 0 12px rgba(196, 162, 101, 0.3);
}
.timeline-year {
  font-family: var(--font-display);
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 4px;
}
.timeline-title {
  font-size: 15px;
  color: var(--warm-white);
  margin-bottom: 4px;
  font-weight: 500;
}
.timeline-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
@media (min-width: 640px) {
  .timeline-line { right: 50%; transform: translateX(50%); }
  [dir="ltr"] .timeline-line { left: 50%; right: auto; transform: translateX(-50%); }
  .timeline-item:nth-child(odd) {
    padding: 0 calc(50% + 30px) 40px 0;
    text-align: right;
  }
  .timeline-item:nth-child(even) {
    padding: 0 0 40px calc(50% + 30px);
    text-align: left;
  }
  [dir="ltr"] .timeline-item:nth-child(odd) {
    padding: 0 0 40px calc(50% + 30px);
    text-align: left;
  }
  [dir="ltr"] .timeline-item:nth-child(even) {
    padding: 0 calc(50% + 30px) 40px 0;
    text-align: right;
  }
  .timeline-item:nth-child(odd) .timeline-dot { right: calc(50% - 7px); }
  .timeline-item:nth-child(even) .timeline-dot { right: auto; left: calc(50% - 7px); }
  [dir="ltr"] .timeline-item:nth-child(odd) .timeline-dot { right: auto; left: calc(50% - 7px); }

/* ═══════════════════════════════════════════

.gallery-grid {

  margin-top: 28px;

.gallery-cell {

  justify-content: center;
  position: relative;
  overflow: hidden;

.gallery-cell:first-child {

}

    grid-row: 1 / 3;

.gallery-cell:hover {

}
.gallery-cell svg {
  color: var(--gold-dark);
  opacity: 0.3;
}
.gallery-cell .gallery-label {

  bottom: 0;
  left: 0;
  right: 0;

/* ═════��═════════════════════════════════════

   ═══════════════════════════════════════════ */
#rsvp {

}
.rsvp-deadline {

.form-group {

}

.form-group input[type="text"],

.form-group textarea {

.form-group input:focus,

.form-group textarea {

}
.form-group select {

  background-repeat: no-repeat;
  background-position: left 14px center;

}
[dir="ltr"] .form-group select {
  background-position: right 14px center;
  padding-left: 16px;
  padding-right: 36px;
}
/* Radio buttons */
.radio-group {
  display: flex;
  gap: 12px;
}
.radio-option {
  flex: 1;
  position: relative;
}
.radio-option input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.radio-option .radio-label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 12px;
  background: var(--bg-card);
  border: 1px solid rgba(196, 162, 101, 0.1);
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  transition: all 0.3s ease;
  min-height: 48px;
  text-align: center;
}
.radio-option input:checked + .radio-label.accept {
  border-color: var(--gold);
  background: rgba(196, 162, 101, 0.08);
  color: var(--gold);
}
.radio-option input:checked + .radio-label.decline {
  border-color: var(--text-muted);
  background: rgba(92, 86, 78, 0.1);
  color: var(--text-secondary);
}
/* Checkbox for events */
.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.checkbox-option {
  position: relative;
  display: flex;
  align-items: center;
}
.checkbox-option input {
  position: absolute;
  opacity: 0;
}
.checkbox-option .check-label {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid rgba(196, 162, 101, 0.08);
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-secondary);
  width: 100%;
  transition: all 0.3s ease;
  min-height: 48px;
}
.checkbox-option .check-box {
  width: 20px;
  height: 20px;
  border: 1.5px solid var(--gold-dark);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.3s ease;
}
.checkbox-option input:checked + .check-label {
  border-color: rgba(196, 162, 101, 0.2);
  color: var(--gold-light);
}
.checkbox-option input:checked + .check-label .check-box {
  background: var(--gold);
  border-color: var(--gold);
}
.checkbox-option input:checked + .check-label .check-box svg {
  opacity: 1;
}
.checkbox-option .check-box svg {
  opacity: 0;
  color: var(--bg-deep);
  transition: opacity 0.2s ease;
}
.btn-submit {
  width: 100%;
  padding: 16px;
  font-size: 16px;
  margin-top: 8px;
}
.btn-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none !important;
}
.btn-submit .spinner {
  width: 18px;
  height: 18px;
  border: 2px solid transparent;
  border-top-color: var(--bg-deep);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* Success state */
.rsvp-success {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.rsvp-success.show {
  display: block;
  animation: fadeInUp 0.6s ease;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.success-check {
  width: 64px;
  height: 64px;
  margin: 0 auto 20px;
  color: var(--success);
}
.success-check circle {
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
  animation: drawCircle 0.6s ease forwards;
}
.success-check polyline {
  stroke-dasharray: 50;
  stroke-dashoffset: 50;
  animation: drawCheck 0.4s ease 0.5s forwards;
}
@keyframes drawCircle {
  to { stroke-dashoffset: 0; }
}
@keyframes drawCheck {
  to { stroke-dashoffset: 0; }
}
.success-title {
  font-family: var(--font-display);
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 12px;
}
.success-message {
  font-size: 15px;
  color: var(--text-secondary);
}

/* ═══════════════════════════════════════════
   PERSISTENT UI
   ═══════════════════════════════════════════ */
/* Language toggle */
.lang-toggle {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 900;
  background: rgba(14, 21, 41, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(196, 162, 101, 0.15);
  border-radius: 20px;
  padding: 8px 16px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.5s ease;
  min-height: 44px;
}
.lang-toggle.visible { opacity: 1; }
.lang-toggle .lang-ar { color: var(--gold); }
.lang-toggle .lang-sep { color: var(--text-muted); }
.lang-toggle .lang-en { color: var(--text-muted); }
.lang-toggle[data-active="en"] .lang-ar { color: var(--text-muted); }
.lang-toggle[data-active="en"] .lang-en { color: var(--gold); }
/* Music toggle */
.music-toggle {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 900;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(14, 21, 41, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(196, 162, 101, 0.2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  opacity: 0;
  transition: opacity 0.5s ease, border-color 0.3s ease;
}
.music-toggle.visible { opacity: 1; }
.music-toggle:hover { border-color: var(--gold); }
.music-bar {
  width: 3px;
  background: var(--gold);
  border-radius: 2px;
  transition: height 0.3s ease;
}
.music-bar:nth-child(1) { height: 8px; }
.music-bar:nth-child(2) { height: 14px; }
.music-bar:nth-child(3) { height: 10px; }
.music-bar:nth-child(4) { height: 16px; }
.music-toggle.playing .music-bar {
  animation: musicBounce 0.6s ease-in-out infinite alternate;
}
.music-toggle.playing .music-bar:nth-child(1) { animation-delay: 0s; }
.music-toggle.playing .music-bar:nth-child(2) { animation-delay: 0.15s; }
.music-toggle.playing .music-bar:nth-child(3) { animation-delay: 0.3s; }
.music-toggle.playing .music-bar:nth-child(4) { animation-delay: 0.45s; }
@keyframes musicBounce {
  from { height: 4px; }
  to { height: 18px; }
}
/* Nav dots */
.nav-dots {
  position: fixed;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 900;
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  transition: opacity 0.5s ease;
}
[dir="ltr"] .nav-dots { left: auto; right: 16px; }
.nav-dots.visible { opacity: 1; }
.nav-dot {
  position: relative;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  padding: 0;
}
.nav-dot.active {
  background: var(--gold);
  box-shadow: 0 0 8px rgba(196, 162, 101, 0.4);
}
.nav-dot .dot-label {
  position: absolute;
  right: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  font-size: 11px;
  color: var(--gold-light);
  background: rgba(14, 21, 41, 0.9);
  padding: 4px 10px;
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
[dir="ltr"] .nav-dot .dot-label {
  right: auto;
  left: calc(100% + 12px);
}
.nav-dot:hover .dot-label { opacity: 1; }
/* ═══════════════════════════════════════════

/* ═══════════════════════════════════════════
   REDUCED MOTION
   ═══════════════════════════════════════════ */

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════
function getUrlParam(key) {
  try {
    const params = new URLSearchParams(window.location.search);
    return params.get(key);
  } catch(e) { return null; }
}
function toArabicNumerals(num) {
  const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(num).replace(/[0-9]/g, d => arabicDigits[+d]);
}
function t(key) {
  return TRANSLATIONS[STATE.lang][key] || key;
}
function l(obj) {
  if (!obj) return '';
  return obj[STATE.lang] || obj.ar || '';
}

// INITIALIZATION
// ═══════════════════════════════════════════════════════════
function init() {
  // Parse URL parameters
  STATE.guestName = getUrlParam('guest');
  STATE.guestCount = getUrlParam('count');
  const langParam = getUrlParam('lang');
  const eventParam = getUrlParam('event');
  // Language from URL or session or default
  if (langParam === 'en' || langParam === 'ar') {
    STATE.lang = langParam;
  } else {
    const saved = sessionStorage.getItem('carta-lang');
    if (saved) STATE.lang = saved;
  }
  // Build dynamic content
  buildTimeline();
  buildGiftOptions();
  buildGuestDropdown();
  buildNavDots();
  createParticles();
  // Set initial language
  applyLanguage(false);
  // Populate config-driven content
  populateContent();
  // Handle QR section
  if (CONFIG.showQR && CONFIG.qrUrl) {
    const qrImg = document.getElementById('qr-code-img');
    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(CONFIG.qrUrl)}&bgcolor=FFFFFF&color=0B1121`;
  } else {
    const qrSec = document.getElementById('qr-section');
    if (qrSec) qrSec.classList.add('hidden');
  }
  // Hide optional sections
  if (!CONFIG.showTimeline) document.getElementById('timeline').classList.add('hidden');
  if (!CONFIG.showGallery) document.getElementById('gallery').classList.add('hidden');
  // Setup music
  if (CONFIG.musicSrc) {
    const audio = document.getElementById('bg-music');
    audio.querySelector('source').src = CONFIG.musicSrc;
    audio.load();
  }
  // Pre-fill RSVP from URL
  if (STATE.guestName) {
    document.getElementById('rsvp-name').value = decodeURIComponent(STATE.guestName);
  }
  if (STATE.guestCount) {
    const sel = document.getElementById('rsvp-guests');
    const val = parseInt(STATE.guestCount);
    if (val >= 1 && val <= CONFIG.rsvp.maxGuests) sel.value = val;
  }
  if (eventParam) {
    const radio = document.querySelector(`input[name="event_choice"][value="${eventParam}"]`);
    if (radio) radio.checked = true;
  }
  // RSVP deadline check
  checkRsvpDeadline();
  // Setup event listeners
  setupEventListeners();
  // Setup scroll reveal
  setupScrollReveal();
  // Start countdown
  updateCountdown();
  setInterval(updateCountdown, 1000);
  // Footer credit
  const creditLink = document.getElementById('footer-credit-link');
  creditLink.href = CONFIG.footerCredit.url;
  creditLink.textContent = CONFIG.footerCredit.name;
  // Map embeds
  document.getElementById('ceremony-map').src = CONFIG.ceremony.mapEmbed;
  document.getElementById('reception-map').src = CONFIG.reception.mapEmbed;
}

  document.getElementById('bride-house-address').textContent = l(CONFIG.locations.brideHouse.address);
  document.getElementById('bride-house-card').href = CONFIG.locations.brideHouse.mapUrl;
  // Footer couple
  document.getElementById('footer-groom').textContent = l(CONFIG.groom.firstName);
  document.getElementById('footer-bride').textContent = l(CONFIG.bride.firstName);
  // RSVP message placeholder
  document.getElementById('rsvp-message').placeholder = t('rsvpMessagePlaceholder');
}
// ════════════════════════════════════════════════════���══════
// LANGUAGE SYSTEM
// ═══════════════════════════════════════════════════════════
function applyLanguage(animate) {
  const lang = STATE.lang;
  const html = document.documentElement;
  html.lang = lang;
  html.dir = lang === 'ar' ? 'rtl' : 'ltr';
  // Swap CSS font variables
  if (lang === 'ar') {
    document.documentElement.style.setProperty('--font-display', 'var(--font-display-ar)');
    document.documentElement.style.setProperty('--font-verse', 'var(--font-verse-ar)');
    document.documentElement.style.setProperty('--font-body', 'var(--font-body-ar)');
  } else {
    document.documentElement.style.setProperty('--font-display', 'var(--font-display-en)');
    document.documentElement.style.setProperty('--font-verse', "'Playfair Display', serif");
    document.documentElement.style.setProperty('--font-body', 'var(--font-body-en)');
  }
  // Update all translatable elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (TRANSLATIONS[lang][key] !== undefined) {
      el.textContent = TRANSLATIONS[lang][key];
    }
  });
  // Repopulate config-driven content
  populateContent();
  // Update toggle button
  const toggle = document.getElementById('lang-toggle');
  toggle.setAttribute('data-active', lang);
  // Save
  sessionStorage.setItem('carta-lang', lang);
  // Animate
  if (animate) {
    document.body.classList.add('lang-fade');
    setTimeout(() => document.body.classList.remove('lang-fade'), 400);
  }
  // Update nav dot labels
  updateNavDotLabels();
  // Update countdown display
  updateCountdown();
}
function toggleLanguage() {
  STATE.lang = STATE.lang === 'ar' ? 'en' : 'ar';
  applyLanguage(true);
}
// ═══════════════════════════════════════════════════════════
// OPENING ENVELOPE
// ═══════════════════════════════════════════════════════════
function openEnvelope() {
  const overlay = document.getElementById('opening-overlay');
  overlay.classList.add('opening');
  document.body.classList.remove('locked');
  STATE.isOpen = true;
  // Show persistent UI
  setTimeout(() => {
    document.getElementById('lang-toggle').classList.add('visible');
    document.getElementById('music-toggle').classList.add('visible');
    document.getElementById('nav-dots').classList.add('visible');
  }, 500);
  // Remove overlay from DOM after animation
  setTimeout(() => {
    overlay.style.display = 'none';
  }, 900);
  // Try to play music
  if (CONFIG.musicSrc) {
    try {
      const audio = document.getElementById('bg-music');
      audio.play().then(() => {
        STATE.isPlaying = true;
        document.getElementById('music-toggle').classList.add('playing');
      }).catch(() => {});
    } catch(e) {}
  }
}
// ═══════════════════════════════════════════════════════════
// COUNTDOWN
// ═════════════════════════════════════���═════════════════════
function updateCountdown() {
  const target = new Date(CONFIG.countdownTarget).getTime();
  const now = Date.now();
  const diff = target - now;
  if (diff <= 0) {
    document.getElementById('countdown-grid').classList.add('hidden');
    const done = document.getElementById('countdown-done');
    done.classList.remove('hidden');
    done.textContent = t('countdownDone');
    return;
  }
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((diff % (1000 * 60)) / 1000);
  const format = (n) => STATE.lang === 'ar' ? toArabicNumerals(n) : String(n);
  document.getElementById('cd-days').textContent = format(days);
  document.getElementById('cd-hours').textContent = format(hours);
  document.getElementById('cd-minutes').textContent = format(minutes);
  document.getElementById('cd-seconds').textContent = format(seconds);
}
// ═══════════════════��═══════════════════════════════════════
// BUILD DYNAMIC ELEMENTS
// ═══════════════════════════════════════════════════════════
function buildTimeline() {
  const container = document.getElementById('timeline-container');
  CONFIG.timeline.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'timeline-item reveal';
    div.style.transitionDelay = `${0.1 * (i + 1)}s`;
    div.innerHTML = `
      <div class="timeline-dot"></div>
      <div class="timeline-year">${item.year}</div>
      <div class="timeline-title" data-tl-title="${i}">${l(item.title)}</div>
      <div class="timeline-desc" data-tl-desc="${i}">${l(item.desc)}</div>
    `;
    container.appendChild(div);
  });
}
function buildGiftOptions() {
  const container = document.getElementById('gift-options');
  CONFIG.gifts.options.forEach(opt => {
    const a = document.createElement('a');
    a.className = 'gift-card';
    a.href = opt.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
      <span>${opt.name}</span>
    `;
    container.appendChild(a);
  });
}
function buildGuestDropdown() {
  const select = document.getElementById('rsvp-guests');
  for (let i = 1; i <= CONFIG.rsvp.maxGuests; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    select.appendChild(opt);
  }
}
function buildNavDots() {
  const nav = document.getElementById('nav-dots');
  const sections = document.querySelectorAll('section[id], footer[id]');
  sections.forEach(sec => {
    if (sec.classList.contains('hidden')) return;
    const btn = document.createElement('button');
    btn.className = 'nav-dot';
    btn.setAttribute('data-target', sec.id);
    btn.setAttribute('aria-label', `Navigate to ${sec.id}`);
    const label = document.createElement('span');
    label.className = 'dot-label';
    label.textContent = sec.getAttribute(`data-nav-label-${STATE.lang}`) || sec.id;
    btn.appendChild(label);
    btn.addEventListener('click', () => {
      sec.scrollIntoView({ behavior: 'smooth' });
    });
    nav.appendChild(btn);
  });
}
function updateNavDotLabels() {
  document.querySelectorAll('.nav-dot').forEach(dot => {
    const target = dot.getAttribute('data-target');
    const sec = document.getElementById(target);
    if (sec) {
      const label = dot.querySelector('.dot-label');
      label.textContent = sec.getAttribute(`data-nav-label-${STATE.lang}`) || target;
    }
  });
}
function createParticles() {
  const container = document.getElementById('particles-container');
  const isMobile = window.innerWidth < 640;
  const count = isMobile ? 10 : 20;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 1 + Math.random() * 2.5;
    const left = Math.random() * 100;
    const duration = 15 + Math.random() * 20;
    const delay = Math.random() * duration;
    p.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${left}%;
      animation-duration: ${duration}s;
      animation-delay: -${delay}s;
      opacity: 0;
    `;
    container.appendChild(p);
  }
}
// ═══════════════════════════════════════════════════════════
// RSVP
// ═══════════════════════════════════════════════════════════
function checkRsvpDeadline() {
  const deadlineEl = document.getElementById('rsvp-deadline');
  const deadline = new Date(CONFIG.rsvp.deadline + 'T23:59:59');
  const now = new Date();
  if (now > deadline) {
    deadlineEl.textContent = t('rsvpExpired');
    deadlineEl.classList.add('expired');
    document.getElementById('rsvp-form').querySelectorAll('input, select, textarea, button').forEach(el => {
      el.disabled = true;
    });
  } else {
    deadlineEl.textContent = t('rsvpDeadline');
  }
}
function handleRsvpSubmit(e) {
  e.preventDefault();
  const name = document.getElementById('rsvp-name').value.trim();
  if (!name) {
    document.getElementById('rsvp-name').focus();
    return;
  }
  const btn = document.getElementById('rsvp-submit');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span><span>${t('rsvpSubmitting')}</span>`;
  const data = {
    name: name,
    phone: document.getElementById('rsvp-phone').value.trim(),
    attendance: document.querySelector('input[name="attendance"]:checked').value,
    guests: parseInt(document.getElementById('rsvp-guests').value),
    events: document.querySelector('input[name="event_choice"]:checked')?.value || 'both',
    message: document.getElementById('rsvp-message').value.trim(),
    timestamp: new Date().toISOString()
  };
  if (CONFIG.rsvp.endpoint) {
    fetch(CONFIG.rsvp.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(res => {
      if (!res.ok) throw new Error('Network response was not ok');
      return res.json();
    })
    .then(() => showRsvpSuccess())
    .catch(err => {
      console.error('RSVP submission error:', err);
      // Show success anyway for demo purposes
      showRsvpSuccess();
    });
  } else {
    // No endpoint configured — log and show success
    console.log('RSVP Data:', data);
    setTimeout(showRsvpSuccess, 1200);
  }
}
function showRsvpSuccess() {
  const form = document.getElementById('rsvp-form');
  const success = document.getElementById('rsvp-success');
  form.style.display = 'none';
  success.classList.add('show');
  triggerConfetti();
}
// ═══════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════
function triggerConfetti() {
  const colors = [
    'var(--gold)', 'var(--gold-light)', 'var(--warm-white)',
    'var(--rose)', 'var(--gold-bright)'
  ];
  const colorValues = ['#C4A265', '#DFC999', '#ECE6DC', '#C47070', '#D4AF37'];
  const count = 70;
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const size = 4 + Math.random() * 8;
    const x = Math.random() * 100;
    const color = colorValues[Math.floor(Math.random() * colorValues.length)];
    const duration = 2 + Math.random() * 2;
    const delay = Math.random() * 0.8;
    piece.style.cssText = `
      left: ${x}%;
      top: -10px;
      width: ${size}px;
      height: ${size * 0.6}px;
      background: ${color};
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
    `;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), (duration + delay) * 1000 + 500);
  }
  // Cleanup all after 5s
  setTimeout(() => {
    document.querySelectorAll('.confetti-piece').forEach(p => p.remove());
  }, 5000);
}
// ═══════════════════════════════════════════════════════════
// SCROLL REVEAL & NAV TRACKING
// ═══════════════════════════════════════════════════════════
function setupScrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  // Nav dot tracking
  const navObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const dot = document.querySelector(`.nav-dot[data-target="${entry.target.id}"]`);
      if (dot) {
        if (entry.isIntersecting) {
          document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('active'));
          dot.classList.add('active');
        }
      }
    });
  }, { threshold: 0.3 });
  document.querySelectorAll('section[id], footer[id]').forEach(sec => {
    navObserver.observe(sec);
  });
}
// ═══════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
function setupEventListeners() {
  // Open envelope
  document.getElementById('btn-open-envelope').addEventListener('click', openEnvelope);
  // Language toggle
  document.getElementById('lang-toggle').addEventListener('click', toggleLanguage);
  // Music toggle
  document.getElementById('music-toggle').addEventListener('click', () => {
    const audio = document.getElementById('bg-music');
    const btn = document.getElementById('music-toggle');
    try {
      if (STATE.isPlaying) {
        audio.pause();
        STATE.isPlaying = false;
        btn.classList.remove('playing');
      } else {
        audio.play().then(() => {
          STATE.isPlaying = true;
          btn.classList.add('playing');
        }).catch(() => {});
      }
    } catch(e) {}
  });
  // RSVP attendance toggle
  document.querySelectorAll('input[name="attendance"]').forEach(radio => {
    radio.addEventListener('change', (e) => {
      const isDecline = e.target.value === 'decline';
      document.getElementById('rsvp-guests-group').classList.toggle('hidden', isDecline);
      document.getElementById('rsvp-events-group').classList.toggle('hidden', isDecline);
    });
  });
  // RSVP form submit
  document.getElementById('rsvp-form').addEventListener('submit', handleRsvpSubmit);
  // WhatsApp share
  document.getElementById('btn-whatsapp').addEventListener('click', () => {
    const text = STATE.lang === 'ar'
      ? `يسعدنا دعوتكم لحضور حفل زفاف ${CONFIG.groom.firstName.ar} و${CONFIG.bride.firstName.ar}\n${window.location.href}`
      : `You are cordially invited to the wedding of ${CONFIG.groom.firstName.en} & ${CONFIG.bride.firstName.en}\n${window.location.href}`;
    const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
    window.open(url, '_blank');
  });
  // Calendar download
  document.getElementById('btn-calendar').addEventListener('click', () => {
    const start = new Date(CONFIG.ceremony.date);
    const end = new Date(CONFIG.reception.date);
    end.setHours(end.getHours() + 4);
    const formatDate = (d) => d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, '');
    const ics = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//CARTA//Wedding//EN',
      'BEGIN:VEVENT',
      `DTSTART:${formatDate(start)}`,
      `DTEND:${formatDate(end)}`,
      `SUMMARY:Wedding of ${CONFIG.groom.firstName.en} & ${CONFIG.bride.firstName.en}`,
      `DESCRIPTION:Wedding ceremony and reception`,
      `LOCATION:${CONFIG.ceremony.venue.en}`,
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');
    const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `wedding-${CONFIG.groom.firstName.en}-${CONFIG.bride.firstName.en}.ics`;
    a.click();
    URL.revokeObjectURL(url);
  });
  // Copy link
  document.getElementById('btn-copy-link').addEventListener('click', () => {
    try {
      navigator.clipboard.writeText(window.location.href).then(() => {
        showCopyFeedback();
      }).catch(() => {
        fallbackCopy(window.location.href);
      });
    } catch(e) {
      fallbackCopy(window.location.href);
    }
  });
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showCopyFeedback(); } catch(e) {}
  document.body.removeChild(ta);
}
function showCopyFeedback() {
  const fb = document.getElementById('copy-feedback');
  fb.textContent = t('copyDone');
  fb.classList.add('show');
  setTimeout(() => fb.classList.remove('show'), 2000);
}
// ═══════════════════════════════════════════════════════════
// LANGUAGE-AWARE TIMELINE UPDATE
// ═══════════════════════════════════════════════════════════
// Override applyLanguage to also update timeline
const _origApply = applyLanguage;
applyLanguage = function(animate) {
  _origApply(animate);
  // Update timeline items
  CONFIG.timeline.forEach((item, i) => {
    const titleEl = document.querySelector(`[data-tl-title="${i}"]`);
    const descEl = document.querySelector(`[data-tl-desc="${i}"]`);
    if (titleEl) titleEl.textContent = l(item.title);
    if (descEl) descEl.textContent = l(item.desc);
  });
  // Update RSVP deadline
  checkRsvpDeadline();
};
